services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis 7 — JWT blacklist + session store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Go API — port 8080
  # ---------------------------------------------------------------------------
  go-api:
    build:
      context: ./services/go-api
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MINUTES: "30"
      AI_SERVICE_URL: http://ai-service:8000
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # FastAPI AI Service — port 8000
  # ---------------------------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      GO_API_URL: http://go-api:8080
      AI_MODEL_NAME: ${AI_MODEL_NAME:-all-MiniLM-L6-v2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    depends_on:
      go-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # apps/main — HR/Supervisor/Admin Next.js app (port 3000)
  # ---------------------------------------------------------------------------
  main-app:
    build:
      context: .
      dockerfile: apps/main/Dockerfile
    environment:
      INTERNAL_API_URL: http://go-api:8080
      NEXT_PUBLIC_API_URL: ""
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      go-api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # apps/portal — Applicant Portal Next.js app (port 3001)
  # ---------------------------------------------------------------------------
  portal-app:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    environment:
      INTERNAL_API_URL: http://go-api:8080
      NEXT_PUBLIC_API_URL: ""
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      go-api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
